<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendation</title>
    <style>
        :root{
            --primary-bg-color: rgb(10,180,230);
            --primary-font-color: rgb(10,4,50);
        }
        *{
            margin: auto;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }

        body{
            border-collapse: collapse;
        }

        #header_nav{
            height: 40px;
            display: flex;
            flex-direction: row;
            background-color: var(--primary-bg-color)
        }
        #title_homepage{
            display: flex;     
            flex-direction: row; 
        }
        #logo_homepage{
            font-size: 30px;
        }

        #textTitle_homepage{
            color: var(--primary-font-color);
        }
        
        #links_homepage{
            padding: 10px 0px; 
        }

        .link_homepage{
            text-decoration: none;
            margin-left: 5px;
            color: var(--primary-font-color);
        }

        .link_homepage:hover{
            color: white;
        }

        .link_homepage:active{
            color: var(--primary-font-color);
        }

        #search_navigator{
            width: 400px;
            height: 30px;
            background-color: white;
            border: none;
            border-radius: 40px;
        }

        #search_box{
            border: none;
            background-color: transparent;
            width: 200px;
            margin-left: 15px;
            outline: none;
            color: black;
            margin-top: 5px;
        }

        .search_button{
            border-radius: 20px;
            background-color: rgb(20,60,20);
            color: white;
            padding: 0px 10px;
            margin-right: 5px;
            cursor:pointer;
        }

        .search_button:hover{
            background-color:rgb(100,200,100);
        }



    </style>
</head>
<body>
    <nav id="header_nav">
        <div id="title_homepage">
            <span id="logo_homepage">✈️</span>
            <h1 id="textTitle_homepage">TravelFast</h1>
        </div>
        <div id= "links_homepage">
            <a class="link_homepage" href= "/travel_recommendation.html">Home</a>
            <a class="link_homepage" href="/about_us.html">About us</a>
            <a class="link_homepage" href="/contact_us.html">Contact us</a>
        </div>
        <div id="search_navigator">
            <input id="search_box" placeholder="Enter a destination or keyboard">
            <button class ="search_button" id= "search_button">Search</button>
            <button class ="search_button" id= "clear_button">Clear</button>
        </div>
    </nav>
</body>
</html>
