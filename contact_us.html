<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendation</title>
    <style>
        :root{
            --primary-bg-color: rgb(243, 157, 72);
            --primary-bg-color-a: rgba(243, 157, 72,0.6);
            --primary-font-color: rgb(86, 42, 3);
            --secondary-font-color: rgb(249, 134, 26);
            --secundary-bg-color: rgb(235, 101, 24);
            --person-font-color: rgb(74, 34, 7);
            --descripcion-person-font-color: rgb(0, 0, 0);
        }
        *{
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }

        body{
            border-collapse: collapse;
            margin: 0px;
            background-image: url(travels.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #header_nav{
            height: 90px;
            display: flex;
            flex-direction: row;
            background-color: var(--primary-bg-color-a);
        }
        #title_homepage{
            display: flex;     
            flex-direction: row;
            justify-content: center; 
            margin-top: 8px;
        }
        #logo_homepage{
            font-size: 30px;
            text-decoration: none;
            margin: auto;
            margin-right: 5px;
            margin-left: 10px;
        }

        #text_title_a{
            text-decoration: none;
            margin: auto;
        }

        #textTitle_homepage{
            color: var(--primary-font-color);
            cursor: pointer;
        }
        
        #links_homepage{
            padding: 10px 0px 0px 30px;
            margin: 25px 0px 0px 320px; 
        }

        .link_homepage{
            text-decoration: none;
            font-size: 20px;
            margin-left: 5px;
            color: var(--primary-font-color);
        }

        .link_homepage:hover{
            color: white;
        }

        .link_homepage:active{
            color: var(--primary-font-color);
        }

        #contact_us{
            display: flex;
            flex-direction: row;
            align-items: center;
            height: 80vh;
        }


        #social_networks{
            max-width: 100px;
            display: flex;
            flex-direction: column;
            padding: 0px 20px;
            margin-top: 100px;
            margin-left: 20px;
            margin-right: 20px;
        }

        .social_network{
            text-decoration: none;
            font-size: 30px;
            color: white;
            padding: 20px 0px;        
        }

        #contact_us_container{
            display: flex;
            flex-direction: column;
            width: 60%;
            margin-left: 30px;
        }

        #contact_us_container h1{
            font-size: 70px;
            margin-top: 130px;
            color: var(--secondary-font-color);
         }

        #contact_us_container p{
            font-size: 18px;
            color: var(--secondary-font-color);
            margin-top: -10px;
        }

        #contact_us_form{
            display: flex;
            flex-direction: column;
            width: 30%;
            margin-right: 50px;
            
        }

        .input_for_contact{
            background-color: transparent;
            border: 1px solid  white;
            outline: none;
            margin: 22px 0px 22px 0px;
            border-radius: 5px;
            padding: 9px 0px;
        }

        .label_for_contact{
            color: var(--secondary-font-color);
        }

        #submit_button{
            height: 30px;
            background-color: var(--secundary-bg-color);
            color: var(--primary-font-color);
            cursor: pointer;
        }

      

    </style>
</head>
<body>
    <nav id="header_nav">
        <div id="title_homepage">
            <a href="/index.html" id="logo_homepage">✈️</a>
            <a id="text_title_a" href="/index.html"><h1 id="textTitle_homepage">TravelFast</h1></a>
        </div>
        <div id= "links_homepage">
            <a class="link_homepage" href= "/index.html">Home</a>
            <a class="link_homepage" href="/about_us.html">About us</a>
            <a class="link_homepage" href="/contact_us.html">Contact us</a>
        </div> 
    </nav>

    <div id="contact_us">
        
        <nav id="social_networks">
            <a class="social_network" href="https://x.com">𝕏</a>
            <a class="social_network" href="https://facebook.com">ⓕ</a>
            <a class="social_network" href="https://instagram.com">🅾</a>
            <a class="social_network" href="https://youtube.com">▶</a>
        </nav>

        <div id="contact_us_container">
            <h1>CONTACT US</h1>
            <p>Get in touch</p>
        </div>

        <form id="contact_us_form">
            <label class="label_for_contact" for="enter_your_name">Name</label>
            <input class="input_for_contact" id="enter_your_name" type="text" placeholder="Enter your Name">
            <label class="label_for_contact" for="enter_your_email">Email</label>
            <input class="input_for_contact" id="enter_your_email" type="email" placeholder="Enter your mail">
            <label class="label_for_contact" for="enter_your_message">Message</label>
            <textarea class="input_for_contact" id="enter_your_message" rows=15 placeholder="Enter your message"></textarea>
            <button id= "submit_button">Submit</button>
        </form>
       

    </div>

   



</body>
</html>
